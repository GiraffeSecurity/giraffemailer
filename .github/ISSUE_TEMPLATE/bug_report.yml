name: Bug report
description: Something is broken or not working as documented
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please do **not** include real passwords, IMAP credentials, or `secret_key` values.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install via Docker / source
        2. Add account ...
        3. Click Sync
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - Docker
        - Build from source (make build-full)
        - Pre-built binary
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or git commit
      placeholder: e.g. v0.1.0 or abc1234

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server log excerpt (redact secrets)
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Security
      options:
        - label: This is not a security vulnerability (see SECURITY.md for those)
          required: true
