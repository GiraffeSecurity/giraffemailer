services:
  giraffemail:
    build: .
    image: giraffemail:latest
    ports:
      - "9191:9191"
    volumes:
      - giraffemail-data:/data
    env_file:
      - .env
    environment:
      TZ: UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9191/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  giraffemail-data:
